# Barsha — staging/production-like overlay.
# Stands the entire stack up on a single host: MSSQL + Meilisearch + Ollama +
# AI service + NestJS backend + Angular frontend behind nginx.
#
# Quick start:
#   1. Copy env: cp .env.staging.example .env.staging
#      Edit JWT_SECRET (must be 32+ chars), SMTP creds, CTP creds.
#   2. Build the Angular bundle:  npm ci && npm run build:prod
#      (This step runs on the host since it produces dist/barsha/browser/.)
#   3. Bring everything up:  docker compose -f docker-compose.staging.yml --env-file .env.staging up -d
#   4. Apply migrations once the DB is healthy:
#        docker compose -f docker-compose.staging.yml --env-file .env.staging exec backend npm run migrate:prod
#   5. Smoke test:
#        curl http://localhost/health         (via nginx → backend)
#        curl http://localhost/api/categories
#        Open  http://localhost/              (Angular shell)
#
# This compose is intentionally a SINGLE-HOST staging rig — not a multi-node
# production deploy. For real production: split DB to a managed instance,
# put backend behind a load balancer, use a real CDN for the frontend.

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: barsha-mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-Barsha-Staging-2026!}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${DB_PASSWORD:-Barsha-Staging-2026!}' -No -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: barsha-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_TOKEN:-barsha-staging-master-key}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7700/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: barsha-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # One-shot: pull the model so chat doesn't fail on first request.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "OLLAMA_HOST=http://ollama:11434 ollama pull ${OLLAMA_MODEL:-qwen2.5:7b}"
    restart: "no"

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: barsha/ai-service:latest
    container_name: barsha-ai
    restart: unless-stopped
    expose:
      - "8001"
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_TOKEN: ${MEILISEARCH_TOKEN:-barsha-staging-master-key}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ai-cache:/root/.cache

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: barsha/backend:latest
    container_name: barsha-backend
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      # Override hostnames so containers talk on the compose network.
      DB_HOST: mssql
      DB_PORT: "1433"
      MEILISEARCH_URL: http://meilisearch:7700
      AI_SERVICE_URL: http://ai-service:8001
      OLLAMA_URL: http://ollama:11434
    expose:
      - "8000"
    depends_on:
      mssql:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      ai-service:
        condition: service_started
    volumes:
      - backend-uploads:/app/uploads

  frontend:
    image: nginx:1.27-alpine
    container_name: barsha-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Angular bundle built on the host with `npm run build:prod`.
      - ./dist/barsha/browser:/usr/share/nginx/html:ro
      - ./deploy/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mssql-data:
  meili-data:
  ollama-models:
  ai-cache:
  backend-uploads:
