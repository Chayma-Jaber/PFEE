<div class="main-content" *ngIf="!isLoading">
  <!-- Hero Banner Section -->
  <picture class="hero-banner">
    <!-- Mobile Source -->
    <source media="(max-width: 991px)" [srcset]="searchResults?.hits[0]?.slides[0]?.mob_media?.medium?.url 
        ? (searchResults.hits[0].slides[0].mob_media.medium.url + ' 501w, ' + searchResults.hits[0].slides[0].mob_media.url + ' 1200w')
        : searchResults?.hits[0]?.slides[0]?.mob_media?.url" sizes="100vw">

    <!-- Desktop Source -->
    <source media="(min-width: 992px)" [srcset]="searchResults?.hits[0]?.slides[0]?.media?.medium?.url
        ? (searchResults.hits[0].slides[0].media.medium.url + ' 750w, ' + searchResults.hits[0].slides[0].media.url + ' 1905w')
        : searchResults?.hits[0]?.slides[0]?.media?.url" sizes="100vw">

    <!-- Fallback Image -->
    <img [src]="searchResults?.hits[0]?.slides[0]?.media?.url"
      [alt]="searchResults?.hits[0]?.slides[0]?.media?.name || 'BARSHA Fashion Models'" class="img-fluid w-100"
      fetchpriority="high" loading="eager">
  </picture>

  <div class="buttons" *ngIf="searchResults?.hits[0]?.navBtns">
    <button *ngFor="let button of searchResults.hits[0].navBtns"
      [ngClass]="{'btn-outline': button.bgColor === '#000000', 'btn-outline1': button.bgColor === '#ffffff'}"
      [routerLink]="['/categorie', button.linkTo]" [title]="button.text || 'Catégorie ' + button.linkTo"
      (click)="onGenderButtonClick(button)">
      {{button.text}}
    </button>

  </div>

</div>

<div class="container-fluid py-3 my-2 my-md-3 bg-light" *ngIf="!isLoading && promoSection">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-9">
      <div class="promo-container text-center"
        [ngStyle]="{'background-color': promoSection.bgColor, 'color': promoSection.textColor}">
        <div class="promo-title">
          {{ promoSection.text }}
        </div>
        <div class="promo-subtitle mx-auto col-12 col-md-10">
          {{ promoSection.subText }}
        </div>
        <button class="promo-button mt-2"
          [ngStyle]="{'background-color': promoSection.btnBgColor, 'color': promoSection.btnTextColor}"
          (click)="$any(window).open(promoSection.btnLink, '_blank')">
          {{ promoSection.btnText }}
        </button>
      </div>
    </div>
  </div>
</div>

<section class="s-extra">
  <div class="row top">
    <div class="col-eight md-six tab-full popular">
      <app-welcome-popup *ngIf="showWelcomePopup" [popupData]="popupData"
        (close)="onCloseWelcomePopup()"></app-welcome-popup>
    </div>
  </div>
</section>
