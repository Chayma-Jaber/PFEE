# Barsha — nginx reverse proxy + CDN-friendly cache headers
#
# Serves:
#   /                → Angular SPA (dist/barsha) with long-cache on hashed assets
#   /api/            → NestJS backend on :8000
#   /ai/             → FastAPI AI microservice on :8001 (optional)
#
# Drop this into /etc/nginx/conf.d/barsha.conf (or equivalent), edit server_name + ssl paths.

# Rate limit zone for API (burst-friendly, 10 r/s per IP sustained)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream barsha_backend { server 127.0.0.1:8000; keepalive 32; }
upstream barsha_ai      { server 127.0.0.1:8001; keepalive 16; }

server {
    listen 80;
    listen [::]:80;
    server_name barsha.com.tn www.barsha.com.tn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name barsha.com.tn www.barsha.com.tn;

    # TLS — replace with your certs
    ssl_certificate     /etc/letsencrypt/live/barsha.com.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/barsha.com.tn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip + brotli
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    root /var/www/barsha/dist/barsha/browser;
    index index.html;

    # Hashed assets — immutable, 1 year, strongly cached on CDN
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|webp|avif|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # Service worker must NEVER be cached by the CDN — it controls every update cycle.
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri =404;
    }

    location = /ngsw.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        try_files $uri =404;
    }

    # index.html — always revalidated, but cacheable briefly
    location = /index.html {
        add_header Cache-Control "no-cache, max-age=0";
        try_files $uri =404;
    }

    # SPA fallback — every unmatched path serves the Angular shell
    location / {
        add_header Cache-Control "no-cache, max-age=0";
        try_files $uri $uri/ /index.html;
    }

    # API proxy — no CDN cache, pass Authorization
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://barsha_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # Tell CDNs NOT to cache API responses by default
        add_header Cache-Control "no-store" always;
    }

    # Optional: proxy the Python AI microservice
    location /ai/ {
        rewrite ^/ai/(.*)$ /$1 break;
        proxy_pass http://barsha_ai;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;    # AI calls can be slow
        add_header Cache-Control "no-store" always;
    }

    # Block common probe paths
    location ~ /\. { deny all; return 404; }
}
