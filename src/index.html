  <!-- Script pour améliorer la crawlabilité des liens -->
  <script>
// Version avec gestion des erreurs
document.addEventListener('DOMContentLoaded', function() {
  try {
    const links = document.querySelectorAll('a[href]:not([rel])');
    links.forEach(link => {
      // Liens externes
      if (link.hostname && link.hostname !== window.location.hostname) {
        link.setAttribute('rel', 'noopener noreferrer');
      }
      // Liens internes
      if (!link.hasAttribute('title') && link.textContent.trim()) {
        const title = link.getAttribute('aria-label') || link.textContent.trim();
        if (title) link.setAttribute('title', `Découvrez ${title} sur BARSHA`);
      }
    });
  } catch (e) {
    console.error('Erreur dans le script de liens :', e);
  }
});
  </script>
