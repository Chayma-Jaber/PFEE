# Minimal AI stack — just Ollama + the FastAPI service.
# Use when you want to run the Node backend natively (nest start:dev)
# but still get real AI inference locally.
#
#   docker compose -f docker-compose.ai-only.yml up -d

services:
  ollama:
    image: ollama/ollama:latest
    container_name: barsha-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "OLLAMA_HOST=http://ollama:11434 ollama pull ${OLLAMA_MODEL:-qwen2.5:7b}"
    restart: "no"

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: barsha/ai-service:latest
    container_name: barsha-ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      MEILISEARCH_URL: ${MEILISEARCH_URL:-http://host.docker.internal:7700}
      MEILISEARCH_TOKEN: ${MEILISEARCH_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ai-cache:/root/.cache

volumes:
  ollama-models:
  ai-cache:
