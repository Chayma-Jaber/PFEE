<div class="footer-wrapper">
  <!-- Newsletter Footer Widget -->
  <app-newsletter-footer></app-newsletter-footer>

  <footer class="footer">
    <div class="container">
      <!-- Dynamic footer widget sections from API -->
      <ng-container *ngIf="footerData?.widgets">
        <div class="footer-section" *ngFor="let widget of footerData.widgets">
          <h3>{{ widget.title }}</h3>
          <ul>
            <li *ngFor="let item of widget.items">
              <a [routerLink]="item.linkTo" (click)="onItemClick(item,$event)">{{ item.title }}</a>
            </li>
          </ul>
        </div>
      </ng-container>
      <!-- Support Section (always visible) -->
      <div class="footer-section">
        <h3>Support</h3>
        <ul>
          <li><a routerLink="/aide">Centre d'aide</a></li>
          <li><a routerLink="/profile/support">Mes tickets</a></li>
          <li><a routerLink="/contact-us">Nous contacter</a></li>
          <li><a routerLink="/stores">Nos Boutiques</a></li>
        </ul>
      </div>
    </div>

    <div class="social-media">
      <h4 class="boldd">SUIVEZ-NOUS!</h4>
      <div class="icons" *ngIf="socialLinks?.length">
        <a *ngFor="let link of socialLinks" [href]="link.link" target="_blank"
          [attr.aria-label]="'Visit our ' + link.title + ' page'">
          <i [class]="'fab fa-' + link.title.toLowerCase()"></i>
        </a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>Copyright © <span class="bold">{{ currentYear }}.</span> All Rights Reserved By <span class="bold">{{
          footerData?.brand || 'Barsha' }}</span></p>
      <a (click)="scrollToTop()" class="back-to-top"><i class="fa-solid fa-chevron-up"></i></a>
    </div>
  </footer>
</div>
<p-toast></p-toast>
