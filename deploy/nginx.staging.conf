# Barsha — staging-rig nginx config (used inside docker-compose.staging.yml).
# No TLS, no rate limit, no CDN headers — this is single-host staging only.
# For production, see nginx.sample.conf.

upstream barsha_backend { server backend:8000; keepalive 32; }
upstream barsha_ai      { server ai-service:8001; keepalive 16; }

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed assets — long cache.
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|webp|avif|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SW must never be cached.
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /ngsw.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API.
    location /api/ {
        proxy_pass http://barsha_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Backend root-level routes (excluded from /api prefix in main.ts).
    location = /health   { proxy_pass http://barsha_backend; }
    location ~ ^/indexes/ { proxy_pass http://barsha_backend; }

    # Optional AI passthrough.
    location /ai/ {
        rewrite ^/ai/(.*)$ /$1 break;
        proxy_pass http://barsha_ai;
        proxy_read_timeout 120s;
    }
}
